<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>Ultimate Dashboard - By ANABRATA</title>
    
    <!-- Tab Icons -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>

        /* ============================================================
           CSS RESET & DESIGN SYSTEM
           ============================================================ */
        :root {
            --bg-color: #030305;
            --surface-color: rgba(13, 13, 20, 0.45);
            --surface-border: rgba(255, 255, 255, 0.07);
            --surface-border-hover: rgba(255, 255, 255, 0.15);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.35);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-bounce: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --glass-blur: blur(25px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        /* Ambient Glowing Blobs */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            left: -200px;
            z-index: -2;
            animation: floatGlow 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: -2;
            animation: floatGlow2 12s infinite alternate-reverse ease-in-out;
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 100px) scale(1.15); }
        }

        @keyframes floatGlow2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, -150px) scale(0.9); }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #030305;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255,255,255,0.03);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            color: var(--text-main);
            text-transform: uppercase;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ============================================================
           HEADER & NAV BAR
           ============================================================ */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            background: rgba(3, 3, 5, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            transition: var(--transition-smooth);
        }

        .header.scrolled {
            padding: 12px 40px;
            background: rgba(3, 3, 5, 0.8);
            border-color: rgba(255,255,255,0.05);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            width: 340px;
            max-width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 11px 16px 11px 44px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
            outline: none;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .search-input:focus + .search-icon {
            color: var(--primary);
        }

        /* ============================================================
           TAB BAR (Category Switches)
           ============================================================ */
        .tab-bar-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .tab-bar {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--surface-border);
            padding: 6px;
            border-radius: 40px;
            display: flex;
            gap: 4px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--text-main);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* ============================================================
           WEBSITES CONTENT GRID
           ============================================================ */
        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .tab-content {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
        }

        /* Grid Categories */
        .category-section {
            margin-bottom: 45px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }

        .category-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--primary);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        /* Bookmark Card */
        .bookmark-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: var(--transition-bounce);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 80px;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .bookmark-card:hover {
            transform: translateY(-6px);
            border-color: var(--surface-border-hover);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .bookmark-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .bookmark-icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .bookmark-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .bookmark-emoji {
            font-size: 1.1rem;
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-name {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bookmark-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }


        /* ============================================================
           FLASHCARDS CONTENT GRID
           ============================================================ */
        .fc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Flashcard Cover Card */
        .fc-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            height: 160px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: var(--transition-bounce);
        }

        .fc-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--surface-border-hover);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .fc-card-logo-wrap {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: auto;
        }

        .fc-card-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fc-card-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fc-card-stat {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .fc-note-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 0.95rem;
            opacity: 0.8;
            color: var(--primary);
        }

        /* ============================================================
           NOTEPAD OVERLAY SYSTEM
           ============================================================ */
        .notepad-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 3, 5, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
        }

        .notepad-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .notepad {
            width: 750px;
            max-width: 90%;
            height: 520px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.9);
            transition: var(--transition-bounce);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .notepad-overlay.active .notepad {
            transform: scale(1);
        }

        .notepad-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .notepad-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .notepad-body {
            flex: 1;
            padding: 24px 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .notepad-textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.05rem;
            line-height: 1.6;
            transition: var(--transition-smooth);
        }

        .notepad-textarea[readonly] {
            cursor: default;
        }

        .notepad-footer {
            padding: 16px 30px;
            border-top: 1px solid var(--surface-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.01);
        }

        .notepad-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .notepad-btns {
            display: flex;
            gap: 12px;
        }

        .notepad-btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: var(--transition-smooth);
        }

        .notepad-btn-close {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        .notepad-btn-close:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Responsive adjustments */
        @media(max-width: 768px) {
            .header { padding: 15px 20px; }
            .header.scrolled { padding: 10px 20px; }
            .content-container { padding: 0 20px 100px; }
            .search-wrapper { width: 100%; margin-top: 10px; order: 3; }
            .header { flex-wrap: wrap; }
            .fc-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 8px 16px; font-size: 0.85rem; }
        }
        
    
        /* Collapsible Accordion for Others Tab */
        .accordion-group {
            margin-bottom: 12px;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: var(--transition-smooth);
        }
        
        .accordion-group:hover {
            border-color: var(--surface-border-hover);
        }
        
        .accordion-header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: var(--transition-smooth);
        }
        
        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .accordion-title-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .accordion-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .accordion-arrow {
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }
        
        .accordion-header.active .accordion-arrow {
            transform: rotate(180deg);
            color: var(--primary);
        }
        
        .accordion-panel {
            display: none;
            padding: 0 24px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(0, 0, 0, 0.1);
        }
            /* Top-Level Categories Grid in Others Tab */
        .top-level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .top-level-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 170px;
            cursor: pointer;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            transition: var(--transition-bounce);
        }
        
        .top-level-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--surface-border-hover);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        
        .top-level-card-emoji {
            font-size: 2.6rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }
        
        .top-level-card-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-main);
            text-transform: capitalize;
        }
        
        .top-level-card-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
        
        /* Back Button */
        .back-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            transition: var(--transition-smooth);
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        .back-icon {
            width: 16px;
            height: 16px;
            color: var(--text-main);
        }
    </style>
    <script src="others.js" defer></script>
</head>
<body>

    <!-- Ambient Glowing Backdrop -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Anabrata's Space</div>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="header" id="mainHeader">
        <div class="logo-section">
            <img src="logo.png" class="logo-img" alt="Logo" onerror="this.style.display='none'">
            <h1 class="logo-title">ANABRATA's Space</h1>
        </div>
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Search resources...">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
        </div>
    </header>

    <!-- ===== SWITCH TAB BAR ===== -->
    <div class="tab-bar-container">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('websites')">Websites</button>
            <button class="tab-btn" onclick="switchTab('flashcards')">Flash Cards</button>
            <button class="tab-btn" onclick="switchTab('others')">Others</button>
        </div>
    </div>

    <!-- ===== MAIN CONTENT CONTAINER ===== -->
    <main class="content-container">
        
        <!-- Websites Grid Area -->
        <div id="websitesTab" class="tab-content active">
            <div id="dashboard"></div>
        </div>

        <!-- Flashcards Grid Area -->
        <div id="flashcardsTab" class="tab-content">
            <div class="fc-grid" id="flashcardsArea"></div>
        </div>

        <!-- Others Grid Area -->
        <div id="othersTab" class="tab-content">
            <div id="othersDashboard"></div>
        </div>

    </main>

    <!-- ===== CUSTOM NOTEPAD OVERLAY ===== -->
    <div class="notepad-overlay" id="notepadOverlay">
        <div class="notepad">
            <div class="notepad-header">
                <div style="display: flex; align-items: center; gap: 14px;">
                    <div id="notepadLogo" style="width: 38px; height: 38px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <img src="" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size: 1.1rem;">🃏</span>
                    </div>
                    <span class="notepad-title" id="notepadTitle">Flash Card Note</span>
                </div>

                const resultsHeader = document.createElement('div');
                resultsHeader.style.marginBottom = '20px';
                resultsHeader.style.color = 'var(--text-muted)';
                resultsHeader.style.fontFamily = 'var(--font-display)';
                resultsHeader.style.fontSize = '0.95rem';
                othersDashboard.appendChild(resultsHeader);

                const grid = document.createElement('div');
                grid.className = 'category-grid';
                othersDashboard.appendChild(grid);

                const keys = Object.keys(othersData);
                for (let i = 0; i < keys.length; i++) {
                    const topLevel = keys[i];
                    const subs = othersData[topLevel];
                    const subKeys = Object.keys(subs);
                    
                    for (let j = 0; j < subKeys.length; j++) {
                        const subCat = subKeys[j];
                        const filteredLinks = subs[subCat].filter(l => 
                            l.name.toLowerCase().includes(lowerFilter) || 
                            (l.desc && l.desc.toLowerCase().includes(lowerFilter))
                        );

                        for (let k = 0; k < filteredLinks.length; k++) {
                            if (matchesCount >= matchLimit) break;
                            const link = filteredLinks[k];
                            matchesCount++;

                            const card = document.createElement('div');
                            card.className = 'bookmark-card';
                            const iconUrl = getIcon(link.url);
                            
                            card.innerHTML = `
                                <div class="bookmark-card-top">
                                    <div class="bookmark-icon-wrap">
                                        <img src="${iconUrl}" class="bookmark-icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                        <span class="bookmark-emoji" style="display:none;">ðŸ”—</span>
                                    </div>
                                    <div class="bookmark-info">
                                        <div class="bookmark-name">${link.name}</div>
                                        <div class="bookmark-desc">${link.desc || 'No description'}</div>
                                    </div>
                                </div>
                            `;
                            card.onclick = () => {
                                window.location.href = link.url;
                            };
                            grid.appendChild(card);
                        }
                        if (matchesCount >= matchLimit) break;
                    }
                    if (matchesCount >= matchLimit) break;
                }

                if (matchesCount === 0) {
                    othersDashboard.innerHTML = `<div style="text-align: center; color: var(--text-muted); margin-top: 40px;">No matching links found in Others.</div>`;
                } else {
                    resultsHeader.textContent = `Showing first ${matchesCount} matches for "${filter}"`;
                }
            } else if (currentOthersCategory === null) {
                // Render top-level category cards
                const grid = document.createElement('div');
                grid.className = 'top-level-grid';

                othersTopLevels.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'top-level-card';
                    card.onclick = () => openOthersCategory(item.name);
                    
                    card.innerHTML = `
                        <div class="top-level-card-emoji">${item.emoji}</div>
                        <div class="top-level-card-title">${item.name}</div>
                        <div class="top-level-card-count">${item.count.toLocaleString()} links</div>
                    `;
                    grid.appendChild(card);
                });
                othersDashboard.appendChild(grid);
            } else {
                // Render sub-category section-wise view for the opened top-level category
                const catData = othersData[currentOthersCategory];
                if (!catData) {
                    currentOthersCategory = null;
                    renderOthers(filter);
                    return;
                }

                // Back button
                const backBtn = document.createElement('button');
                backBtn.className = 'back-btn';
                backBtn.onclick = backToOthersCategories;
                backBtn.innerHTML = `
                    <svg class="back-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"></path>
                    </svg>
                    <span>Back to Categories</span>
                `;
                othersDashboard.appendChild(backBtn);

                // Section header
                const titleEmoji = emojiMap[currentOthersCategory.toLowerCase()] || "ðŸ”—";
                const titleHeader = document.createElement('div');
                titleHeader.style.display = 'flex';
                titleHeader.style.alignItems = 'center';
                titleHeader.style.gap = '14px';
                titleHeader.style.marginBottom = '30px';
                titleHeader.innerHTML = `
                    <span style="font-size: 2.2rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));">${titleEmoji}</span>
                    <h1 class="logo-title" style="font-size: 2.2rem; text-transform: capitalize; margin: 0; background: linear-gradient(90deg, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${currentOthersCategory}</h1>
                `;
                othersDashboard.appendChild(titleHeader);

                // Render each subcategory as a section
                const subKeys = Object.keys(catData);
                subKeys.forEach(subName => {
                    const links = catData[subName];
                    if (links.length === 0) return;

                    const section = document.createElement('div');
                    section.className = 'category-section';

                    const header = document.createElement('div');
                    header.className = 'category-header';
                    const cleanSubName = subName === '/' ? 'General' : subName;
                    header.innerHTML = `<h2 class="category-title">${cleanSubName}</h2>`;
                    section.appendChild(header);

                    const grid = document.createElement('div');
                    grid.className = 'category-grid';

                    links.forEach(link => {
                        const card = document.createElement('div');
                        card.className = 'bookmark-card';
                        const iconUrl = getIcon(link.url);
                        
                        card.innerHTML = `
                            <div class="bookmark-card-top">
                                <div class="bookmark-icon-wrap">
                                    <img src="${iconUrl}" class="bookmark-icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                    <span class="bookmark-emoji" style="display:none;">ðŸ”—</span>
                                </div>
                                <div class="bookmark-info">
                                    <div class="bookmark-name">${link.name}</div>
                                    <div class="bookmark-desc">${link.desc || 'No description'}</div>
                                </div>
                            </div>
                        `;
                        card.onclick = () => {
                            window.location.href = link.url;
                        };
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    othersDashboard.appendChild(section);
                });
            }
        }

// Render Flashcards Grid
        function renderFlashCards() {
            flashcardsArea.innerHTML = '';

            if (flashCards.length === 0) {
                flashcardsArea.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); margin-top: 40px;">No flashcards found. Edit FLASHCARDS in index.html to add some.</div>`;
                return;
            }

            flashCards.forEach(fc => {
                const card = document.createElement('div');
                card.className = 'fc-card';
                
                const imageUrl = resolveImageUrl(fc.image || '');
                const hasNote = fc.note && fc.note.trim().length > 0;
                
                const chars = fc.note ? fc.note.length : 0;
                const words = fc.note ? fc.note.trim().split(/\s+/).filter(w => w).length : 0;

                card.innerHTML = `
                    <div class="fc-card-logo-wrap">
                        <img class="fc-card-logo-img" src="${imageUrl}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <span style="display:none; font-size: 1.2rem;">🃏</span>
                    </div>
                    ${hasNote ? '<div class="fc-note-badge">📝</div>' : ''}
                    <div class="fc-card-title" style="margin-top: 15px;">${fc.name}</div>
                    <div class="fc-card-stat">${words} Words · ${chars} Chars</div>
                `;
                
                card.onclick = () => {
                    openNotepad(fc.id);
                };
                
                flashcardsArea.appendChild(card);
            });
        }

        // Search Listener (works for Websites and Others tabs)
        searchInput.addEventListener('input', (e) => {
            if (currentTab === 'websites') {
                renderBookmarks(e.target.value);
            } else if (currentTab === 'others') {
                renderOthers(e.target.value);
            }
        });

        // ============================================================
        // CUSTOM NOTEPAD SYSTEM
        // ============================================================
        const notepadOverlay = document.getElementById('notepadOverlay');
        const notepadTextarea = document.getElementById('notepadTextarea');
        const notepadCounts = document.getElementById('notepadCounts');

        window.openNotepad = function(fcId) {
            const fc = flashCards.find(c => c.id === fcId);
            if (!fc) return;

            currentNotepadFcId = fcId;
            
            document.getElementById('notepadTitle').textContent = fc.name;
            notepadTextarea.value = fc.note || '';
            
            const logoImg = document.getElementById('notepadLogo').querySelector('img');
            const imageUrl = resolveImageUrl(fc.image || '');
            logoImg.src = imageUrl;
            logoImg.style.display = 'block';
            logoImg.nextElementSibling.style.display = 'none';

            updateWordCount(fc.note || '');
            notepadOverlay.classList.add('active');
        };

        window.closeNotepad = function() {
            notepadOverlay.classList.remove('active');
            currentNotepadFcId = null;
            renderFlashCards();
        };

        function updateWordCount(text) {
            const charCount = text.length;
            const wordCount = text.trim().split(/\s+/).filter(w => w).length;
            notepadCounts.textContent = `${charCount} characters · ${wordCount} words`;
        }

        // ============================================================
        // ON LOAD INITIALIZATION
        // ============================================================
        renderBookmarks();
    })();
    </script>
</body>
</html>
